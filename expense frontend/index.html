<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Expense Tracker</h2>

<button onclick="logout()" class="logout-btn">Logout</button>

<!-- Expense Form -->
<div class="form-group">

<input id="amount" type="number" placeholder="Amount">

<select id="category">
<option value="">Select Category</option>
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Rent">Rent</option>
<option value="Shopping">Shopping</option>
</select>

<input id="note" placeholder="Note">

<input id="date" type="date">

<button id="addBtn">Add Expense</button>

</div>

<!-- Filters -->
<div class="filters">

<input type="text" id="searchInput" placeholder="Search by Note...">

<select id="filterCategory">
<option value="all">All</option>
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Rent">Rent</option>
<option value="Shopping">Shopping</option>
</select>

<input type="month" id="monthFilter">

</div>

<!-- Analytics -->
<div id="analytics">
<h3>Expense Analytics</h3>
<div id="analyticsData"></div>
</div>

<h3>Spending Chart</h3>

<div class="chart-container">
    <canvas id="expenseChart"></canvas>
</div>

<h3>Monthly Spending</h3>

<div class="chart-container">
<canvas id="monthlyChart"></canvas>
</div>

<!-- Expenses -->
<h3>Expenses</h3>
<div id="expensesList" class="expense-list"></div>

<h3 id="filteredTotal">Total: ₹0</h3>

<!-- Pagination -->
<div class="pagination">
<button id="prevPage">Previous</button>
<span id="pageNumber">Page 1</span>
<button id="nextPage">Next</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
